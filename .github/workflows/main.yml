name: Deploy to EC2

on:
  push:
    branches:
      - main 

jobs:
  coverage:
    environment: Team 2 Environment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 - --version=1.8.2

      - name: Configure Poetry
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: poetry install

      - name: Install coverage.py
        run: poetry add coverage --group=dev

      - name: Create .env file with OpenAI API key
        run: |
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" > .env

      - name: Run tests with coverage
        run: |
          poetry run coverage run -m pytest
          poetry run coverage report
          poetry run coverage lcov

      - name: Check coverage percentage
        uses: VeryGoodOpenSource/very_good_coverage@v1.1.1
        with:
          path: ./coverage.lcov
          min_coverage: 80
          exclude: '**/**/__init__.py tests/**'

  build:
    needs: coverage
    environment: Team 2 Environment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Build Docker image
        run: |
          docker build --no-cache -t blossompot/dnd_char_creator:latest .

      - name: Login to Docker registry
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Push Docker image to registry
        run: |
          docker push blossompot/dnd_char_creator:latest

  deploy:
    needs: build
    environment: Team 2 Environment
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
    steps:
      - name: SSH into AWS EC2 instance
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.AWS_SSH_PEM }}
          envs: OPENAI_API_KEY,SECRET_KEY
          script: |
            echo "Stopping and removing existing container..."
            sudo docker rm -f dnd_char_creator || true
      
            echo "Pulling latest image..."
            sudo docker pull blossompot/dnd_char_creator:latest
      
            echo "Running Docker container with OPENAI_API_KEY and SECRET_KEY..."
            sudo docker run -d -p 80:80 \
              --name dnd_char_creator \
              -e OPENAI_API_KEY=$OPENAI_API_KEY \
              -e SECRET_KEY=$SECRET_KEY \
              blossompot/dnd_char_creator:latest
      
            echo "Checking Docker status..."
            sudo docker ps
